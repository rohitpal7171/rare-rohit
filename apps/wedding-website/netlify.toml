[build]
  base    = "apps/wedding-website"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Static assets — serve directly, never redirect
[[redirects]]
  from   = "/audio/*"
  to     = "/audio/:splat"
  status = 200

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
