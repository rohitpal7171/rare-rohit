[build]
  base    = "apps/wedding-website"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Netlify automatically serves static files from dist/ before checking redirects.
# Only the SPA fallback is needed — audio files are served directly.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
